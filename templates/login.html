<!DOCTYPE html>
<html lang="zh-CN" data-theme="newapi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - Turnstile Auth Provider</title>
    <style>
        :root { --bg:#070b14; --card:rgba(10,14,24,.74); --card-strong:rgba(12,18,31,.94); --text:#f4f7ff; --muted:#9ba7c2; --border:rgba(255,255,255,.08); --primary:#4f7cff; --primary-hover:#3d68e6; --secondary:#6be5ea; --success:#67c23a; --danger:#f56c6c; --shadow:0 24px 80px rgba(0,0,0,.45); }
        html[data-theme='light'] { --bg:#f5f7fb; --card:rgba(255,255,255,.88); --card-strong:#fff; --text:#1f2d3d; --muted:#6b7280; --border:#e5eaf3; --primary:#3867f4; --primary-hover:#2e57d2; --secondary:#27c6d9; --shadow:0 22px 60px rgba(15,23,42,.12); }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 20% 20%, rgba(107,229,234,.18), transparent 24%), radial-gradient(circle at 80% 18%, rgba(124,92,255,.16), transparent 28%), var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            padding: 124px 24px 24px;
        }
        {% include '_site_header_styles.html' %}
        .theme-toggle { width:36px; height:36px; border:1px solid var(--border); background:rgba(255,255,255,.05); color:var(--text); border-radius:8px; padding:0; cursor:pointer; }
        .wrap { width: min(1180px, 100%); display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; align-items: stretch; }
        .hero, .form { border: 1px solid var(--border); border-radius: 30px; overflow: hidden; background: color-mix(in srgb, var(--card) 94%, transparent); box-shadow: 0 28px 90px rgba(0,0,0,0.32); backdrop-filter: blur(18px); }
        .hero { padding: 52px; background: linear-gradient(135deg, rgba(79,124,255,.18), rgba(107,229,234,.05)); }
        .hero h1 { font-size: 40px; margin: 0 0 16px; }
        .hero p { color: var(--muted); line-height: 1.7; }
        .hero ul { color: var(--muted); line-height: 1.9; padding-left: 18px; }
        .form { padding: 52px; }
        .tag { display: inline-block; padding: 8px 12px; border-radius: 999px; background: var(--primary-soft, rgba(79,124,255,.12)); color: var(--secondary); margin-bottom: 14px; font-size: 13px; border:1px solid var(--border); }
        h2 { margin: 0 0 12px; font-size: 28px; }
        .msg { margin: 0 0 16px; padding: 12px 14px; border-radius: 12px; background: color-mix(in srgb, var(--primary) 10%, transparent); color: var(--secondary); border: 1px solid color-mix(in srgb, var(--primary) 22%, transparent); }
        .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { min-width: 280px; max-width: 420px; display: flex; gap: 10px; padding: 14px 16px; border-radius: 14px; background: var(--card-strong); border: 1px solid var(--border); box-shadow: 0 18px 46px rgba(0,0,0,.26); }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast-close { margin-left: auto; background: transparent; border: none; color: var(--muted); padding: 0; width: auto; }
        input, button { width: 100%; padding: 15px 16px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); color: var(--text); font: inherit; margin-top: 12px; }
        button { background: var(--primary); border-color: var(--primary); cursor: pointer; font-weight: 700; box-shadow: 0 12px 28px rgba(79,124,255,.24); }
        button:hover { background: var(--primary-hover); }
        .muted { margin-top: 16px; color: var(--muted); font-size: 14px; }
        a { color: var(--secondary); text-decoration: none; }
        @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } .hero, .form { padding: 28px; } }
    </style>
</head>
<body>
    <div class="toast-stack" id="toastStack"></div>
    {% set header_page = 'login' %}
    {% include '_site_header.html' %}
    <div class="page-tools"><button type="button" id="themeToggle" class="theme-toggle" title="切换主题" aria-label="切换主题">◐</button></div>
    <div class="wrap">
        <section class="hero">
            <div class="tag">Admin Portal</div>
            <h1>管理员独立登录页</h1>
            <p>这里是后台管理的独立认证入口，不再和用户页面、后台导航混在一起。登录成功后才可进入运维面板、用户管理与管理员治理界面。</p>
            <ul>
                <li>受保护页面：`/admin`、`/admin/users`、`/admin/admins`</li>
                <li>支持会话保持与退出登录</li>
                <li>建议首次登录后立即修改默认管理员密码</li>
            </ul>
        </section>
        <section class="form">
            <div class="tag">管理员认证</div>
            <h2>登录后台</h2>
            <form method="post">
                <input name="username" placeholder="管理员账号" required>
                <input name="password" type="password" placeholder="管理员密码" required>
                <button type="submit">进入后台</button>
            </form>
            <div class="muted">默认账号：`admin` / 默认密码：`admin123456`</div>
            <div class="muted"><a href="/">返回首页</a></div>
        </section>
    </div>
    <script>
        (function () {
            const root = document.documentElement;
            const toggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('portal-theme') || 'newapi';
            root.setAttribute('data-theme', savedTheme === 'light' ? 'light' : 'newapi');
            toggle?.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'light' ? 'newapi' : 'light';
                root.setAttribute('data-theme', next);
                localStorage.setItem('portal-theme', next);
            });
            const message = {{ (message or '')|tojson }};
            if (!message) return;
            const stack = document.getElementById('toastStack');
            const toast = document.createElement('div');
            const type = /错误|失败|不能为空/.test(message) ? 'error' : 'success';
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div>${type === 'error' ? '✖' : '✔'}</div><div style="line-height:1.6;">${message}</div><button class="toast-close" type="button">×</button>`;
            toast.querySelector('.toast-close').addEventListener('click', () => toast.remove());
            stack.appendChild(toast);
            setTimeout(() => toast.remove(), 3600);
        })();
    </script>
</body>
</html>
