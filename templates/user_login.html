<!DOCTYPE html>
<html lang="zh-CN" data-theme="newapi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - flexapi-captcha</title>
    <style>
        :root { --bg:#070b14; --card:rgba(10,14,24,.74); --card-strong:rgba(12,18,31,.94); --text:#f4f7ff; --muted:#9ba7c2; --border:rgba(255,255,255,.08); --primary:#4f7cff; --primary-hover:#3d68e6; --secondary:#6be5ea; --success:#67c23a; --danger:#f56c6c; --shadow:0 24px 80px rgba(0,0,0,.45); }
        html[data-theme='light'] { --bg:#f5f7fb; --card:rgba(255,255,255,.88); --card-strong:#fff; --text:#1f2d3d; --muted:#6b7280; --border:#e5eaf3; --primary:#3867f4; --primary-hover:#2e57d2; --secondary:#27c6d9; --shadow:0 22px 60px rgba(15,23,42,.12); }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; font-family:"Segoe UI","Microsoft YaHei",sans-serif; color:var(--text); background: radial-gradient(circle at 20% 20%, rgba(107,229,234,.18), transparent 24%), radial-gradient(circle at 80% 18%, rgba(124,92,255,.16), transparent 28%), var(--bg); display:grid; place-items:center; padding:24px; }
        .page-tools { position:fixed; top:20px; right:20px; z-index:20; }
    .page { width:min(1180px, 100%); display:grid; grid-template-columns: 1.12fr .88fr; gap:24px; align-items:stretch; }
    .hero, .card { border:1px solid var(--border); background:var(--card); backdrop-filter:blur(20px); border-radius:28px; box-shadow:0 26px 80px rgba(0,0,0,.26); }
    .hero { padding:40px; position:relative; overflow:hidden; }
        .badge { display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--secondary); }
        h1 { margin:18px 0 10px; font-size: clamp(28px, 3.8vw, 42px); line-height:1.15; max-width:440px; }
        .hero p { color:var(--muted); line-height:1.85; max-width:520px; font-size:14px; }
        .hero-list { display:grid; gap:12px; margin-top:22px; }
    .hero-item { padding:15px 17px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid var(--border); }
    .card { padding:34px; display:flex; flex-direction:column; justify-content:center; }
        .theme-toggle { width:36px; height:36px; border:1px solid var(--border); background:rgba(255,255,255,.05); color:var(--text); border-radius:8px; padding:0; cursor:pointer; }
        .card p { color:var(--muted); margin:0 0 18px; }
        input, button { width:100%; padding:14px 16px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,.04); color:var(--text); font:inherit; margin-top:12px; }
        input:focus { outline:none; border-color:var(--secondary); box-shadow:0 0 0 4px rgba(107,229,234,.12); }
        button[type='submit'] { background:var(--primary); border-color:var(--primary); color:#fff; font-weight:700; cursor:pointer; }
        button[type='submit']:hover { background:var(--primary-hover); border-color:var(--primary-hover); }
        .links { margin-top:18px; display:flex; justify-content:space-between; gap:12px; font-size:14px; }
        a { color:var(--secondary); text-decoration:none; }
        .toast-stack { position: fixed; top: 20px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 12px; }
        .toast { min-width: 320px; max-width: 420px; display:flex; gap:12px; padding:14px 16px; border-radius:12px; border:1px solid var(--border); background:var(--card-strong); box-shadow:0 16px 36px rgba(0,0,0,.2); animation:toastIn .28s cubic-bezier(.21,1.02,.73,1) forwards; position:relative; overflow:hidden; }
        .toast::before { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:var(--secondary); }
        .toast.success::before { background: var(--success); }
        .toast.error::before { background: var(--danger); }
        .toast-icon { width:28px; height:28px; flex:0 0 28px; border-radius:50%; display:grid; place-items:center; background:rgba(255,255,255,.08); }
        .toast-close { margin-left:auto; border:none; background:transparent; color:var(--muted); width:auto; padding:0; }
        @keyframes toastIn { from { transform: translate3d(0,-16px,0) scale(.96); opacity: 0; } to { transform: translate3d(0,0,0) scale(1); opacity: 1; } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; transform: translate3d(0,-10px,0) scale(.96); } }
        @media (max-width: 920px) { .page { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="toast-stack" id="toastStack"></div>
    <div class="page-tools"><button type="button" id="themeToggle" class="theme-toggle" title="切换主题" aria-label="切换主题">◐</button></div>
    <div class="page">
        <section class="hero">
            <span class="badge">统一账户入口</span>
            <h1>承载 AI 应用，管理数字资产，连接未来。</h1>
            <p>普通用户和管理员都从这里登录，系统自动识别身份。管理员进入账户中心后，也保留用户侧常用服务视图。</p>
            <div class="hero-list">
                <div class="hero-item">一个登录页识别用户 / 管理员身份。</div>
                <div class="hero-item">账户中心与后台共享同一套左侧栏模板。</div>
                <div class="hero-item">API Key、Webhook、白名单、账单和调用日志均可直接操作。</div>
            </div>
        </section>
        <section class="card">
            <div>
                <h2 style="margin:0;">{{ '管理员登录' if auth_mode == 'admin' else '统一账户登录' }}</h2>
                <p>{{ '管理员可从此处进入后台或账户中心。' if auth_mode == 'admin' else '用户和管理员共用同一个登录页。' }}</p>
            </div>
            <form method="post">
                <input name="username" placeholder="用户名" required>
                <input name="password" type="password" placeholder="密码" required>
                <button type="submit">立即登录</button>
            </form>
            <div class="links">
                <a href="/user/register">注册账号</a>
                <a href="/">返回首页</a>
            </div>
        </section>
    </div>
    <script>
        (function () {
            const root = document.documentElement;
            const toggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('portal-auth-theme') || 'newapi';
            const toastStack = document.getElementById('toastStack');
            root.setAttribute('data-theme', savedTheme === 'light' ? 'light' : 'newapi');
            toggle?.addEventListener('click', () => {
                const next = root.getAttribute('data-theme') === 'light' ? 'newapi' : 'light';
                root.setAttribute('data-theme', next);
                localStorage.setItem('portal-auth-theme', next);
            });
            const message = {{ (message or '')|tojson }};
            if (!message || !toastStack) return;
            const toast = document.createElement('div');
            const type = /错误|失败|不能为空/.test(message) ? 'error' : 'success';
            const icon = type === 'error' ? '✕' : '✓';
            toast.className = `toast ${type}`;
            toast.innerHTML = `<div class="toast-icon">${icon}</div><div style="flex:1;line-height:1.7;">${message}</div><button class="toast-close" type="button">×</button>`;
            const removeToast = () => { toast.style.animation = 'toastOut .22s ease forwards'; setTimeout(() => toast.remove(), 220); };
            toast.querySelector('.toast-close').addEventListener('click', removeToast);
            toastStack.appendChild(toast);
            setTimeout(removeToast, 3600);
        })();
    </script>
</body>
</html>
